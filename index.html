<!DOCTYPE html>
<html lang="en">

<head>

    <!-- ===============================
         PAGE SETTINGS
    ================================ -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My To-Do List</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <!-- ===============================
         MAIN CONTAINER
    ================================ -->

    <div class="container">

        <h1>📝 My To-Do List</h1>

        <!-- ===============================
             INPUT AREA
             Add a new task
        ================================ -->

<div class="input-area">

    <input
        type="text"
        id="taskInput"
        placeholder="Add a new task..."
    >

    <input
        type="date"
        id="dueDateInput"
    >

    <button id="addBtn">
        Add
    </button>

</div>

        <!-- ===============================
             TASK COUNTER
             Shows task statistics
        ================================ -->

        <div class="task-counter">

            <div class="counter-box">
                <h3 id="totalTasks">0</h3>
                <p>Total</p>
            </div>

            <div class="counter-box">
                <h3 id="completedTasks">0</h3>
                <p>Completed</p>
            </div>

            <div class="counter-box">
                <h3 id="remainingTasks">0</h3>
                <p>Remaining</p>
            </div>

        </div>

        <!-- ===============================
             TASK LIST
             Tasks will be created here
        ================================ -->

        <ul id="taskList"></ul>

        <!-- ===============================
             ACTION BUTTONS
             Manage all tasks
        ================================ -->

        <div class="action-buttons">

            <button id="deleteAllBtn">
                <i class="fa-solid fa-trash"></i>
                Delete All
            </button>

        </div>

    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>

</html>
